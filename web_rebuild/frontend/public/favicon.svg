<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1890ff"/>
  <!-- Stock chart lines -->
  <polyline
    points="6,22 10,18 14,20 20,12 26,8"
    fill="none"
    stroke="#fff"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Up arrow -->
  <polygon
    points="26,8 26,14 20,8"
    fill="#52c41a"
  />
  <!-- Grid dots -->
  <circle cx="6" cy="22" r="1.5" fill="#fff"/>
  <circle cx="10" cy="18" r="1.5" fill="#fff"/>
  <circle cx="14" cy="20" r="1.5" fill="#fff"/>
  <circle cx="20" cy="12" r="1.5" fill="#fff"/>
</svg>